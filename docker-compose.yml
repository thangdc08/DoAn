services:
  # Infrastructure Services
  postgres:
    image: postgis/postgis:16-3.4
    container_name: badminton-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: badminton_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db:/docker-entrypoint-initdb.d
    networks:
      - badminton-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: badminton-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db
    networks:
      - badminton-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: badminton-redis
    ports:
      - "6379:6379"
    networks:
      - badminton-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: badminton-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CLUSTER_ID=L629Z6Z9S6K7X6Z9S6K7X6
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - badminton-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: badminton-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka
    networks:
      - badminton-network

  # Service Registry
  service-registry:
    build:
      context: ./backend
      dockerfile: serviceRegistry/Dockerfile
    container_name: badminton-service-registry
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      - postgres
      - kafka
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Identity Service
  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    container_name: badminton-identity-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/badminton_db?currentSchema=identity
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=identity-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Venue Service
  venue-service:
    build:
      context: ./backend
      dockerfile: venue-service/Dockerfile
    container_name: badminton-venue-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/badminton_db?currentSchema=venue,public
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=venue-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8082/api-docs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Booking Service
  booking-service:
    build:
      context: ./backend
      dockerfile: booking-service/Dockerfile
    container_name: badminton-booking-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/badminton_db?currentSchema=booking
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=booking-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      venue-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8083/v3/api-docs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Payment Service
  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    container_name: badminton-payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/badminton_db?currentSchema=payment
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=payment-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8084/api-docs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Community Service
  community-service:
    build:
      context: ./backend
      dockerfile: community-service/Dockerfile
    container_name: badminton-community-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/badminton_db?currentSchema=community
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=community-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8085/api-docs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Notification Service
  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: badminton-notification-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_MONGODB_URI=mongodb://admin:adminpassword@mongodb:27017/notification_db?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=notification-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8086/api-docs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Recommendation Service
  recommendation-service:
    build:
      context: ./backend
      dockerfile: recommendation-service/Dockerfile
    container_name: badminton-recommendation-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_MONGODB_URI=mongodb://admin:adminpassword@mongodb:27017/recommendation_db?authSource=admin
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=recommendation-service
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8087/api-docs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: badminton-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=api-gateway
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://identity-service:8081
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - badminton-network
    depends_on:
      service-registry:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      venue-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      community-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # AI Service (Node.js)
  ai-service:
    build:
      context: ./backend/ai-service
    container_name: badminton-ai-service
    ports:
      - "8091:8091"
    environment:
      - PORT=8091
      - GATEWAY_URL=http://api-gateway:8080
      - ENABLE_EUREKA=true
      - EUREKA_HOST=service-registry
    networks:
      - badminton-network
    depends_on:
      api-gateway:
        condition: service_healthy

  # Chat Service (Node.js)
  chat-service:
    build:
      context: ./backend/chat-service
    container_name: badminton-chat-service
    ports:
      - "8686:8686"
    environment:
      - PORT=8686
      - ENABLE_EUREKA=true
      - EUREKA_HOST=service-registry
      - HOST_NAME=chat-service
      - IP_ADDRESS=chat-service
      - URI_MONGODB_CHAT=mongodb://admin:adminpassword@mongodb:27017/chat_db?authSource=admin
      - KAFKA_SERVER=kafka:9092
    networks:
      - badminton-network
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  # FB Community Service (Node.js)
  fb-community-service:
    build:
      context: ./backend/fb-community-service
    container_name: badminton-fb-community-service
    ports:
      - "8089:8089"
    environment:
      - PORT=8089
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/fb_community_db?authSource=admin
      - ENABLE_EUREKA=true
      - EUREKA_HOST=service-registry
    networks:
      - badminton-network
    depends_on:
      mongodb:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: badminton-frontend
    ports:
      - "80:80"
    networks:
      - badminton-network
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  badminton-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
