server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: venue-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/venues/**
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
        - id: community-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/community/**
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**
        - id: recommendation-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/recommendations/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: "*"
