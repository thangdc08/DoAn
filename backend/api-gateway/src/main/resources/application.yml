spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    config:
      enabled: false
    stream:
      kafka:
        binder:
          brokers: kafka:9092
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
      - id: identity-service
        uri: lb://identity-service
        predicates:
        - Path=/identity/**
        filters:
        - RewritePath=/identity/(?<segment>.*), /${segment}
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      - id: venue-service
        uri: lb://venue-service
        predicates:
        - Path=/venues/**
        filters:
        - RewritePath=/venues/(?<segment>.*), /${segment}
      - id: booking-service
        uri: lb://booking-service
        predicates:
        - Path=/bookings/**
        filters:
        - RewritePath=/bookings/(?<segment>.*), /${segment}
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      - id: payment-service
        uri: lb://payment-service
        predicates:
        - Path=/payments/**
        filters:
        - RewritePath=/payments/(?<segment>.*), /${segment}
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      - id: community-service
        uri: lb://community-service
        predicates:
        - Path=/communities/**
        filters:
        - RewritePath=/communities/(?<segment>.*), /${segment}
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      - id: chat-service
        uri: lb://chat-service
        predicates:
        - Path=/chat/api/**
        filters:
        - RewritePath=/chat/api/(?<segment>.*), /${segment}
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      - id: notification-service
        uri: lb://notification-service
        predicates:
        - Path=/notifications/**
        filters:
        - RewritePath=/notifications/(?<segment>.*), /api/notifications/${segment}
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      - id: fb-community-service
        uri: lb://fb-community-service
        predicates:
        - Path=/fb-community/**
        filters:
        - RewritePath=/fb-community/(?<segment>.*), /${segment}
      - id: ai-service
        uri: lb://ai-service
        predicates:
        - Path=/ai/**
        filters:
        - RewritePath=/ai/(?<segment>.*), /${segment}
      - id: recommendation-service
        uri: lb://recommendation-service
        predicates:
        - Path=/recommendations/**
        filters:
        - RewritePath=/recommendations/(?<segment>.*), /${segment}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://identity-service:8081
  kafka:
    bootstrap-servers: kafka:9092
jwt:
  signerKey: "${JWT_SIGNER_KEY:zV9X7f6N8M2K5P4R1S3T0U9V8W7X6Y5Z4A3B2C1D0E9F8G7H6I5J4K3L2M1N0O9}"
auth:
  token-url: http://localhost:8080/identity/api/v1/auth/login
  scopes: openid, profile, email
server:
  port: 8080
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
  client:
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://localhost:8761/eureka/
